version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: todoapp-postgres
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: Abc123456
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todoapp-network

volumes:
  postgres_data:

networks:
  todoapp-network:
    driver: bridge
